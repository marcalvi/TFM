name: TFM

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  # Core scientific stack
  - numpy=1.26
  - pandas=2.1
  - scipy=1.11
  - scikit-learn=1.3
  - matplotlib=3.8
  - tqdm

  # PyTorch + CUDA (ensure compatibility with CUDA 12.1)
  - pytorch=2.2.1
  - torchvision=0.17.1
  - torchaudio=2.2.1
  - pytorch-cuda=12.1

  # Logging / explainability
  - tensorboard=2.15
  - shap=0.44

  - pip
  - pip:
      - torch-summary==1.4.5
      - wandb==0.16.6